name = "nami-craft-upload"
main = "index.js"
compatibility_date = "2026-01-01"

# Binding ke R2 bucket. bucket_name harus sama dengan bucket yang kamu buat di dashboard Cloudflare.
[[r2_buckets]]
binding = "NAMI_BUCKET"
bucket_name = "nami-craft-assets"

# URL publik untuk akses file (isi setelah setup custom domain / r2.dev, lihat panduan)
[vars]
PUBLIC_BASE_URL = "https://assets.namicraft.id"

# UPLOAD_API_KEY TIDAK ditaruh di sini karena rahasia.
# Set lewat terminal: wrangler secret put UPLOAD_API_KEY
