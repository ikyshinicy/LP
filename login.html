<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Nami Craft Sorong</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F2D8D8 0%, #FAFAFA 100%);
            padding: 20px;
        }
        .login-box {
            background: #fff;
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .login-box h1 {
            font-family: 'Playfair Display', serif;
            color: #D4A373;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .login-box p.subtitle {
            color: #8D8D8D;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 6px; }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #D4A373; }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #D4A373;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        .btn-login:hover { background-color: #b58555; }
        .error-msg {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #aaa;
            text-decoration: none;
        }
        .back-link:hover { color: #D4A373; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Nami Craft</h1>
        <p class="subtitle">Masuk ke Panel Admin</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Masuk</button>
            <p class="error-msg" id="errorMsg">Username atau password salah.</p>
        </form>

        <a href="index.html" class="back-link">&larr; Kembali ke Website</a>
    </div>

    <script>
        // GANTI username & password di bawah ini sesuai keinginan Ibu Ratna
        const ADMIN_USERNAME = "ratna";
        const ADMIN_PASSWORD = "namicraft2026";

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (user === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {
                sessionStorage.setItem('nami_admin_auth', 'true');
                window.location.href = 'dashboard/index.html';
            } else {
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
